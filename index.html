<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#6d5dfc" />
  <title>Ted — Meu Amigo Virtual</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app-shell">
    <section id="authScreen" class="auth-screen">
      <div class="brand-card">
        <div class="avatar-orb large" aria-hidden="true">
          <div class="face">
            <span class="eye left"></span>
            <span class="eye right"></span>
            <span class="mouth"></span>
          </div>
        </div>
        <h1>Ted</h1>
        <p>Seu amigo virtual acolhedor, companheiro e sempre pronto para conversar.</p>
      </div>

      <form id="authForm" class="auth-card">
        <h2 id="authTitle">Entrar</h2>
        <label>
          Nome <span id="nameOptional">(apenas no cadastro)</span>
          <input id="displayName" type="text" placeholder="Como posso te chamar?" autocomplete="name" />
        </label>
        <label>
          E-mail
          <input id="email" type="email" placeholder="seuemail@exemplo.com" autocomplete="email" required />
        </label>
        <label>
          Senha
          <input id="password" type="password" placeholder="mínimo 6 caracteres" autocomplete="current-password" required />
        </label>
        <button id="authButton" class="primary-btn" type="submit">Entrar</button>
        <button id="toggleAuth" class="ghost-btn" type="button">Criar uma conta</button>
        <button id="resetPassword" class="link-btn" type="button">Esqueci minha senha</button>
        <p id="authMessage" class="message"></p>
      </form>
    </section>

    <main id="chatScreen" class="chat-screen hidden">
      <header class="chat-header">
        <div class="profile">
          <div id="avatar" class="avatar-orb" aria-label="Avatar animado do Ted">
            <div class="face">
              <span class="eye left"></span>
              <span class="eye right"></span>
              <span class="mouth"></span>
            </div>
          </div>
          <div>
            <h1>Ted</h1>
            <p id="statusText">online e pronto para conversar</p>
          </div>
        </div>
        <div class="header-actions">
          <button id="themeBtn" class="round-btn" type="button" title="Alternar tema">☾</button>
          <button id="logoutBtn" class="round-btn" type="button" title="Sair">⎋</button>
        </div>
      </header>

      <section id="messages" class="messages" aria-live="polite"></section>

      <div id="typing" class="typing hidden">
        <span></span><span></span><span></span>
        Ted está pensando...
      </div>

      <form id="chatForm" class="composer">
        <button id="micBtn" class="round-btn mic" type="button" title="Falar com Ted">🎙️</button>
        <textarea id="messageInput" rows="1" placeholder="Escreva ou fale com o Ted..." required></textarea>
        <button id="sendBtn" class="primary-btn send" type="submit">Enviar</button>
      </form>

      <p class="safety-note">Ted é uma IA de companhia. Não substitui médico, psicólogo, advogado, emergência ou atendimento profissional.</p>
    </main>
  </div>

  <script type="module" src="js/chat.js"></script>
</body>
</html>
